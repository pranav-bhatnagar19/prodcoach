<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartBear Product Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  /* ── SMARTBEAR BRAND TOKENS ── */
  /* Primary:  #E8581A (SmartBear orange) */
  /* Dark:     #1A1A2E                   */
  /* Grays:    #F7F8FA bg, #EEF0F4 surface, #DDE1E9 border */
  :root {
    --bg:        #F4F6FA;
    --surface:   #FFFFFF;
    --surface2:  #F0F2F7;
    --border:    #DDE1EA;
    --border2:   #C8CDD9;
    --text:      #1C2136;
    --text2:     #3D4660;
    --muted:     #6B7594;
    --faint:     #A8B0C8;

    --sb-orange: #E8581A;
    --sb-orange-dim: #E8581A15;
    --sb-orange-mid: #E8581A30;
    --sb-dark:   #1A1A2E;

    /* QMetry — teal/green stays but slightly warmer */
    --qm:        #00A87A;
    --qm-dim:    #00A87A14;
    --qm-mid:    #00A87A30;

    /* Reflect — deeper blue */
    --rf:        #3B6EF5;
    --rf-dim:    #3B6EF514;
    --rf-mid:    #3B6EF530;

    /* Swagger — lime green */
    --sw:        #85EA2D;
    --sw-dim:    #85EA2D14;
    --sw-mid:    #85EA2D30;

    --red:       #E53E3E;
    --gold:      #D97706;
    --green:     #00A87A;

    --shadow-sm: 0 1px 3px rgba(28,33,54,.08);
    --shadow-md: 0 4px 12px rgba(28,33,54,.10);
    --shadow-lg: 0 8px 28px rgba(28,33,54,.14);
    
    --lesson-border-width: 1px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ══════════════════════════════════════
     LOGIN PAGE
  ══════════════════════════════════════ */
  #loginPage {
    position: fixed; inset: 0; z-index: 999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  #loginPage.hidden { display: none; }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    padding: 48px 44px 40px;
    width: 400px;
    max-width: 95vw;
    display: flex; flex-direction: column; align-items: center;
  }
  .login-logo {
    width: 180px; margin-bottom: 8px;
  }
  .login-tagline {
    font-size: 12px; font-weight: 500;
    color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 32px;
  }
  .login-title {
    font-family: 'Sora', sans-serif;
    font-size: 22px; font-weight: 700;
    color: var(--text); text-align: center;
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 13px; color: var(--muted);
    text-align: center; margin-bottom: 28px; line-height: 1.5;
  }
  .login-field {
    width: 100%; margin-bottom: 14px;
  }
  .login-field label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text2); margin-bottom: 6px; letter-spacing: 0.03em;
  }
  .login-input {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: var(--text); background: var(--bg);
    outline: none; transition: border .15s;
  }
  .login-input:focus { border-color: var(--sb-orange); }
  .login-btn {
    width: 100%; padding: 12px;
    background: var(--sb-orange); color: #fff;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer; margin-top: 6px;
    transition: opacity .15s, transform .1s;
    letter-spacing: 0.02em;
  }
  .login-btn:hover { opacity: .92; transform: translateY(-1px); }
  .login-btn:active { transform: none; }
  .login-error {
    font-size: 12px; color: var(--red);
    text-align: center; margin-top: 10px;
    min-height: 18px;
  }
  .login-divider {
    width: 100%; height: 1px;
    background: var(--border); margin: 24px 0;
  }
  .login-product-choice {
    display: flex; gap: 10px; width: 100%; margin-bottom: 22px;
  }
  .product-choice-btn {
    flex: 1; padding: 10px 8px; border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface); cursor: pointer;
    font-size: 12px; font-weight: 600; text-align: center;
    transition: all .15s; color: var(--muted);
  }
  .product-choice-btn:hover { border-color: var(--border2); color: var(--text); }
  .product-choice-btn.sel-qm { border-color: var(--qm); color: var(--qm); background: var(--qm-dim); }
  .product-choice-btn.sel-rf { border-color: var(--rf); color: var(--rf); background: var(--rf-dim); }
  .product-choice-btn.sel-sw { border-color: var(--sw); color: var(--sw); background: var(--sw-dim); }
  .product-choice-btn .pico { font-size: 18px; display: block; margin-bottom: 4px; }

  /* ══════════════════════════════════════
     APP SHELL
  ══════════════════════════════════════ */
  #appShell { display: flex; flex-direction: column; height: 100vh; }
  #appShell.hidden { display: none; }

  /* ── TOP NAV ── */
  .topnav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    position: sticky; top: 0; z-index: 100;
    flex-shrink: 0;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 14px;
  }
  .nav-brand img { height: 28px; }
  .nav-brand-sep {
    width: 1px; height: 22px; background: var(--border);
  }
  .nav-brand-label {
    font-family: 'Sora', sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--text2); letter-spacing: 0.02em;
  }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1.5px solid transparent;
    background: transparent; color: var(--muted);
    transition: all .15s; font-family: 'Inter', sans-serif;
  }
  .nav-tab:hover { background: var(--surface2); color: var(--text); }
  .nav-tab.active-qm { background: var(--qm-dim); color: var(--qm); border-color: var(--qm-mid); }
  .nav-tab.active-rf { background: var(--rf-dim); color: var(--rf); border-color: var(--rf-mid); }
  .nav-tab.active-sw { background: var(--sw-dim); color: var(--sw); border-color: var(--sw-mid); }
  .nav-logout {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    transition: all .15s; font-family: 'Inter', sans-serif;
  }
  .nav-logout:hover { border-color: var(--border2); color: var(--text); }

  /* ── LAYOUT ── */
  .layout { display: flex; flex: 1; min-height: 0; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  .sidebar-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .product-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px;
  }
  .badge-qm { background: var(--qm-dim); color: var(--qm); border: 1px solid var(--qm-mid); }
  .badge-rf { background: var(--rf-dim); color: var(--rf); border: 1px solid var(--rf-mid); }
  .badge-sw { background: var(--sw-dim); color: var(--sw); border: 1px solid var(--sw-mid); }

  .sidebar-desc {
    font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 12px;
  }
  .progress-bar-wrap {}
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted); margin-bottom: 5px;
  }
  .progress-track {
    height: 5px; background: var(--surface2);
    border-radius: 99px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%; border-radius: 99px; transition: width .5s ease;
  }
  .fill-qm { background: var(--qm); }
  .fill-rf { background: var(--rf); }
  .fill-sw { background: var(--sw); }

  .module-list { padding: 8px 8px; flex: 1; }
  .module-section { margin-bottom: 4px; }
  .module-section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.09em;
    text-transform: uppercase; color: var(--faint);
    padding: 8px 8px 3px;
  }
  .module-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: 7px; cursor: pointer;
    font-size: 13px; color: var(--muted);
    transition: all .12s;
    border: 1px solid transparent;
  }
  .module-item:hover { background: var(--surface2); color: var(--text); }
  .module-item.active-qm {
    background: var(--qm-dim); color: var(--qm);
    border-color: var(--qm-mid); font-weight: 500;
  }
  .module-item.active-rf {
    background: var(--rf-dim); color: var(--rf);
    border-color: var(--rf-mid); font-weight: 500;
  }
  .module-item.active-sw {
    background: var(--sw-dim); color: var(--sw);
    border-color: var(--sw-mid); font-weight: 500;
  }
  .module-item.active-sw {
    background: var(--rf-dim); color: var(--rf);
    border-color: var(--rf-mid); font-weight: 500;
  }
  .module-item.active-sw {
    background: var(--sw-dim); color: var(--sw);
    border-color: var(--sw-mid); font-weight: 500;
  }
  .module-icon { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
  .module-name { flex: 1; }
  .module-done { font-size: 11px; }

  .mode-toggle {
    display: flex; gap: 6px; padding: 10px 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .toggle-btn {
    flex: 1; padding: 7px; border-radius: 7px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid var(--border);
    background: transparent; color: var(--muted);
    transition: all .12s; font-family: 'Inter', sans-serif;
  }
  .toggle-btn:hover { border-color: var(--border2); color: var(--text); }
  .toggle-btn.active-qm { background: var(--qm-dim); color: var(--qm); border-color: var(--qm-mid); }
  .toggle-btn.active-rf { background: var(--rf-dim); color: var(--rf); border-color: var(--rf-mid); }
  .toggle-btn.active-sw { background: var(--sw-dim); color: var(--sw); border-color: var(--sw-mid); }

  /* ── MAIN ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  .content-area {
    flex: 1; overflow-y: auto; padding: 24px 28px 16px;
  }
  .content-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; margin-bottom: 20px;
    flex-wrap: wrap; gap: 12px;
  }
  .content-title {
    font-family: 'Sora', sans-serif;
    font-size: 22px; font-weight: 700; color: var(--text);
  }
  .tier-tabs {
    display: flex; gap: 3px;
    background: var(--surface2); padding: 3px; border-radius: 8px;
    border: 1px solid var(--border);
  }
  .tier-tab {
    padding: 5px 14px; border-radius: 6px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; border: none;
    background: transparent; color: var(--muted);
    transition: all .12s; font-family: 'Inter', sans-serif;
  }
  .tier-tab:hover { color: var(--text); background: var(--surface); }
  .tier-tab.active-qm { background: var(--qm); color: #fff; }
  .tier-tab.active-rf { background: var(--rf); color: #000; }
  .tier-tab.active-sw { background: var(--sw); color: #000; }

  .lesson-card {
    background: var(--surface);
    border: var(--lesson-border-width) solid var(--border);
    border-radius: 12px;
    padding: 20px 24px; margin-bottom: 12px;
    line-height: 1.7; font-size: 14px; color: var(--text2);
    box-shadow: var(--shadow-sm);
  }
  .lesson-card h3 {
    font-size: 11px; font-weight: 700; letter-spacing: 0.07em;
    text-transform: uppercase; margin-bottom: 12px;
    font-family: 'Sora', sans-serif;
  }
  .lesson-card h3.qm { color: var(--qm); }
  .lesson-card h3.rf { color: var(--rf); }
  .lesson-card h3.sw { color: var(--sw); }
  .lesson-card p { margin-bottom: 10px; }
  .lesson-card ul { padding-left: 20px; }
  .lesson-card li { margin-bottom: 6px; }
  .lesson-card ol { padding-left: 20px; }
  .lesson-card strong { color: var(--text); font-weight: 600; }
  .lesson-card code {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    background: var(--surface2); color: var(--sb-orange);
    padding: 1px 6px; border-radius: 4px;
    border: 1px solid var(--border);
  }

  .quick-prompts {
    display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px;
  }
  .prompt-chip {
    padding: 5px 13px; border-radius: 20px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    transition: all .12s; box-shadow: var(--shadow-sm);
  }
  .prompt-chip:hover { border-color: var(--sb-orange); color: var(--sb-orange); }

  /* Border control slider */
  .border-control {
    display: flex; align-items: center; gap: 12px; margin-top: 20px;
    padding: 12px 16px; background: var(--surface2); border-radius: 8px;
    border: 1px solid var(--border);
  }
  .border-control-label {
    font-size: 11px; font-weight: 600; color: var(--muted);
    letter-spacing: 0.05em; text-transform: uppercase; min-width: 100px;
  }
  .border-slider {
    flex: 1; height: 5px; background: var(--border);
    border-radius: 99px; outline: none; appearance: none;
    cursor: pointer;
  }
  .border-slider::-webkit-slider-thumb {
    appearance: none; width: 16px; height: 16px;
    background: var(--sb-orange); border-radius: 50%;
    cursor: pointer; border: 2px solid #fff;
    box-shadow: 0 2px 4px rgba(0,0,0,.2);
  }
  .border-slider::-moz-range-thumb {
    width: 16px; height: 16px; background: var(--sb-orange);
    border-radius: 50%; cursor: pointer; border: 2px solid #fff;
    box-shadow: 0 2px 4px rgba(0,0,0,.2);
  }
  .border-value {
    font-size: 12px; font-weight: 600; color: var(--text);
    font-family: 'JetBrains Mono', monospace; min-width: 40px; text-align: right;
  }

  /* ── QUIZ ── */
  .quiz-wrap { max-width: 580px; }
  .quiz-q {
    font-size: 16px; font-weight: 600; line-height: 1.5;
    margin-bottom: 20px; color: var(--text);
  }
  .quiz-options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 20px; }
  .quiz-opt {
    padding: 12px 18px; border-radius: 9px; font-size: 14px;
    cursor: pointer; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text2);
    transition: all .12s; text-align: left;
    font-family: 'Inter', sans-serif;
    box-shadow: var(--shadow-sm);
  }
  .quiz-opt:hover { border-color: var(--border2); color: var(--text); }
  .quiz-opt.correct { background: var(--qm-dim); border-color: var(--qm); color: var(--qm); }
  .quiz-opt.correct-rf { background: var(--rf-dim); border-color: var(--rf); color: var(--rf); }
  .quiz-opt.wrong { background: #FFF0F0; border-color: var(--red); color: var(--red); }
  .quiz-feedback {
    padding: 13px 18px; border-radius: 9px;
    font-size: 13px; line-height: 1.6; margin-bottom: 14px;
  }
  .fb-correct { background: var(--qm-dim); color: var(--qm); border: 1px solid var(--qm-mid); }
  .fb-correct-rf { background: var(--rf-dim); color: var(--rf); border: 1px solid var(--rf-mid); }
  .fb-correct-sw { background: var(--sw-dim); color: var(--sw); border: 1px solid var(--sw-mid); }
  .fb-wrong { background: #FFF0F0; color: var(--red); border: 1px solid #FECACA; }
  .score-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    background: var(--surface2); color: var(--gold);
    border: 1px solid var(--border);
  }
  .next-btn {
    padding: 10px 24px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; margin-top: 6px;
    transition: all .12s; font-family: 'Inter', sans-serif;
  }
  .next-btn:hover { opacity: .88; }
  .next-qm { background: var(--qm); color: #fff; }
  .next-rf { background: var(--rf); color: #000; }
  .next-sw { background: var(--sw); color: #000; }
  .next-neutral { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  /* ── CHAT ── */
  .chat-area {
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column;
    max-height: 300px; background: var(--surface);
    flex-shrink: 0;
  }
  .chat-messages {
    flex: 1; overflow-y: auto;
    padding: 14px 20px; display: flex; flex-direction: column; gap: 10px;
  }
  .msg { display: flex; gap: 9px; align-items: flex-start; }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
    border: 1.5px solid var(--border);
  }
  .avatar-coach-qm { background: var(--qm-dim); color: var(--qm); }
  .avatar-coach-rf { background: var(--rf-dim); color: var(--rf); }
  .avatar-coach-sw { background: var(--sw-dim); color: var(--sw); }
  .avatar-user { background: var(--surface2); color: var(--muted); }
  .msg-body {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 14px;
    font-size: 13px; line-height: 1.6; color: var(--text2); max-width: 600px;
  }
  .msg.user .msg-body {
    background: var(--sb-orange-dim); border-color: var(--sb-orange-mid); color: var(--text);
  }
  .chat-input-row {
    display: flex; gap: 8px; padding: 10px 16px;
    border-top: 1px solid var(--border);
  }
  .chat-input {
    flex: 1; background: var(--bg); border: 1.5px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 8px 14px;
    font-size: 13px; font-family: 'Inter', sans-serif; outline: none;
    transition: border .12s;
  }
  .chat-input:focus { border-color: var(--sb-orange); }
  .chat-send {
    padding: 8px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; transition: opacity .12s;
    background: var(--sb-orange); color: #fff;
    font-family: 'Inter', sans-serif;
  }
  .chat-send:hover { opacity: .88; }
  .typing { color: var(--muted); font-style: italic; font-size: 13px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--faint); }
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     LOGIN PAGE
══════════════════════════════════════ -->

// LOGIN
// ══════════════════════════════════════════════════════════
let loginProduct = 'qmetry';

function selectLoginProduct(p) {
  loginProduct = p;
  document.getElementById('choiceQM').className = 'product-choice-btn' + (p==='qmetry' ? ' sel-qm' : '');
  document.getElementById('choiceRF').className = 'product-choice-btn' + (p==='reflect' ? ' sel-rf' : '');
  document.getElementById('choiceSW').className = 'product-choice-btn' + (p==='swagger' ? ' sel-sw' : '');
}

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  if (!email) { err.textContent = 'Please enter your email address.'; return; }
  if (pass !== 'smartbear') { err.textContent = 'Incorrect password. Try: smartbear'; return; }
  err.textContent = '';
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  product = loginProduct;
  init();
}

function doLogout() {
  document.getElementById('appShell').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('chatMessages').innerHTML = '';
}

let product = 'qmetry';

// INIT
// ══════════════════════════════════════════════════════════
function init() {
  const P = PRODUCTS[product];
  activeModule = P.modules[0].id;
  activeTier = 'basics';
  mode = 'learn';
  updateTabUI();
  renderSidebar();
  renderContent();
  addChatMsg('coach', getWelcome());
}

function getWelcome() {
  if (product === 'qmetry') {
    return `Welcome to the <strong>QMetry Product Coach</strong>. I'll guide you through all 10 modules — from getting started all the way to AI features and integrations.<br><br>Pick any module from the sidebar to begin, or switch to <strong>Quiz mode</strong> to test yourself.`;
  } else if (product === 'reflect') {
    return `Welcome to the <strong>Reflect Product Coach</strong>. I'll guide you through Reflect's AI-powered test automation — recording, mobile testing, CI/CD, and integrations.<br><br>Select any module from the sidebar, or jump into <strong>Quiz mode</strong>.`;
  } else {
    return `Welcome to the <strong>Swagger Studio Product Coach</strong>. I'll guide you through OpenAPI-first API design — from the editor to code generation, governance, and collaboration.<br><br>Choose a module to begin learning, or test your knowledge in <strong>Quiz mode</strong>.`;
  }
}

  product = p;
  const P = PRODUCTS[product];
  activeModule = P.modules[0].id;
  activeTier = 'basics';
  mode = 'learn';
  updateTabUI();
  renderSidebar();
  renderContent();
  document.getElementById('chatMessages').innerHTML = '';
  addChatMsg('coach', getWelcome());
}

function updateTabUI() {
  const P = PRODUCTS[product];
  const c = P.color;
  document.getElementById('tabQM').className = 'nav-tab' + (product==='qmetry' ? ' active-qm' : '');
  document.getElementById('tabRF').className = 'nav-tab' + (product==='reflect' ? ' active-rf' : '');
  document.getElementById('tabSW').className = 'nav-tab' + (product==='swagger' ? ' active-sw' : '');
}

// SIDEBAR
// ══════════════════════════════════════════════════════════
function renderSidebar() {
  const P = PRODUCTS[product];
  const c = P.color;
  document.getElementById('productBadge').className = `product-badge ${P.badgeClass}`;
  document.getElementById('productBadge').textContent = P.label;
  document.getElementById('sidebarDesc').textContent = P.desc;

  const total = P.modules.length;
  const done = Object.keys(completed[product]).length;
  document.getElementById('progressText').textContent = `${done} / ${total} modules complete`;
  document.getElementById('progressPct').textContent = `${Math.round(done/total*100)}%`;
  document.getElementById('progressFill').className = `progress-fill fill-${c}`;
  document.getElementById('progressFill').style.width = `${done/total*100}%`;

  const sections = [...new Set(P.modules.map(m=>m.section))];
  let html = '';
  for (const sec of sections) {
    html += `<div class="module-section"><div class="module-section-label">${sec}</div>`;
    for (const m of P.modules.filter(x=>x.section===sec)) {
      const isActive = m.id === activeModule;
      const isDone = completed[product][m.id];
      const cls = isActive ? `module-item active-${c}` : 'module-item';
      html += `<div class="${cls}" onclick="selectModule('${m.id}')">
        <span class="module-icon">${m.icon}</span>
        <span class="module-name">${m.name}</span>
        ${isDone ? `<span class="module-done" style="color:var(--green)">✓</span>` : ''}
      </div>`;
    }
    html += `</div>`;
  }
  document.getElementById('moduleList').innerHTML = html;

  const btnL = document.getElementById('btnLearn');
  const btnQ = document.getElementById('btnQuiz');
  btnL.className = `toggle-btn ${mode==='learn' ? 'active-'+c : ''}`;
  btnQ.className = `toggle-btn ${mode==='quiz' ? 'active-'+c : ''}`;
}

function selectModule(id) {
  activeModule = id;
  activeTier = 'basics';
  renderSidebar();
  if (mode === 'quiz') { startQuiz(); } else { renderContent(); }
}

function setMode(m) {
  mode = m;
  renderSidebar();
  if (m === 'quiz') { startQuiz(); } else { activeTier = 'basics'; renderContent(); }
}

function renderContent() {
  const P = PRODUCTS[product];
  const c = P.color;
  const m = P.modules.find(x=>x.id===activeModule);
  const cont = P.content[activeModule];
  const tiers = ['basics','intermediate','advanced'];
  const tierLabels = ['Basics','Intermediate','Advanced'];
  let recTier = adaptiveTierRecommendation();
  let tiersHtml = tiers.map((t,i) => {
    const cls = t===activeTier ? `tier-tab active-${c}` : 'tier-tab';
    const rec = t===recTier && t!==activeTier ? ' 💡' : '';
    return `<button class="${cls}" onclick="setTier('${t}')">${tierLabels[i]}${rec}</button>`;
  }).join('');
  const prompts = getQuickPrompts();
  const promptsHtml = prompts.map(p=>`<div class="prompt-chip" onclick="askPrompt('${p}')">${p}</div>`).join('');
  
  // Get current border width or default
  const currentBorder = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--lesson-border-width') || '1');
  
  document.getElementById('contentArea').innerHTML = `
    <div class="content-header">
      <div class="content-title">${m.icon} ${m.name}</div>
      <div class="tier-tabs">${tiersHtml}</div>
    </div>
    <div class="lesson-card" id="lessonCard">${cont[activeTier]}</div>
    <div style="margin-bottom:8px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)">Quick questions</div>

    <div class="border-control">
      <div class="border-control-label">Card border width</div>
      <input type="range" class="border-slider" min="0" max="4" step="0.5" value="${currentBorder}" 
        oninput="updateBorderWidth(this.value)"/>
      <div class="border-value" id="borderValue">${currentBorder}px</div>
    </div>`;
}

function setTier(t) { activeTier = t; renderContent(); }

function updateBorderWidth(value) {
  document.documentElement.style.setProperty('--lesson-border-width', value + 'px');
  document.getElementById('borderValue').textContent = value + 'px';
  // Update all lesson cards
  document.querySelectorAll('.lesson-card').forEach(card => {
    card.style.borderWidth = value + 'px';
  });
}

function adaptiveTierRecommendation() {
  const stats = attempts[product][activeModule];
  if (!stats) return 'basics';
  const total = (stats.correct||0) + (stats.wrong||0);
  if (total === 0) return 'basics';
  const pct = (stats.correct||0) / total;
  if (pct >= 0.8) return 'advanced';
  if (pct >= 0.5) return 'intermediate';
  return 'basics';
}

function askPrompt(p) { document.getElementById('chatInput').value = p; sendChat(); }

// ══════════════════════════════════════════════════════════
// QUIZ MODE
// ══════════════════════════════════════════════════════════
function startQuiz() {
  const P = PRODUCTS[product];
  const cards = P.flashcards[activeModule] || [];
  quizCards = [...cards].sort(() => Math.random() - 0.5);
  quizIdx = 0; quizScore = 0; quizAnswered = false;
  renderQuiz();
}

function renderQuiz() {
  const P = PRODUCTS[product];
  const c = P.color;
  if (quizCards.length === 0) {
    document.getElementById('contentArea').innerHTML = `<div class="quiz-wrap"><div class="lesson-card"><h3 class="${c}">No quiz available</h3><p>No flashcards found for this module yet.</p></div></div>`;
    return;
  }
  const card = quizCards[quizIdx];
  const m = P.modules.find(x=>x.id===activeModule);
  const allCards = Object.values(P.flashcards).flat();
  const distractors = allCards.filter(x=>x.a !== card.a).sort(()=>Math.random()-.5).slice(0,3);
  const options = [...distractors, card].sort(()=>Math.random()-.5);
  document.getElementById('contentArea').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
      <div style="font-size:13px;color:var(--muted);font-weight:500">${m.icon} ${m.name} — Quiz Mode</div>
      <div class="score-badge">⭐ ${quizScore} / ${quizIdx}</div>
    </div>
    <div class="quiz-wrap">
      <div style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);margin-bottom:10px">Question ${quizIdx+1} of ${quizCards.length}</div>
      <div class="quiz-q">${card.q}</div>
      <div class="quiz-options" id="quizOpts">
        ${options.map((o,i)=>`<button class="quiz-opt" id="opt${i}" onclick="checkAnswer(${i},'${escQ(o.a)}','${escQ(card.a)}')">${o.a}</button>`).join('')}
      </div>
      <div id="quizFeedback"></div>
    </div>`;
}

function escQ(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function checkAnswer(idx, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  const P = PRODUCTS[product];
  const c = P.color;
  const isCorrect = chosen === correct;
  if (!attempts[product][activeModule]) attempts[product][activeModule] = {correct:0,wrong:0};
  if (isCorrect) { attempts[product][activeModule].correct++; quizScore++; }
  else attempts[product][activeModule].wrong++;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((btn) => {
    if (btn.textContent === correct) { btn.classList.add(c==='rf' ? 'correct-rf' : 'correct'); }
    else if (opts[idx] === btn && !isCorrect) { btn.classList.add('wrong'); }
    btn.disabled = true;
  });
  const fbHtml = isCorrect
    ? `<div class="quiz-feedback ${c==='rf'?'fb-correct-rf':'fb-correct'}">✓ Correct! ${quizCards[quizIdx].a}</div>`
    : `<div class="quiz-feedback fb-wrong">✗ Not quite. Answer: ${quizCards[quizIdx].a}</div>`;
  const nextLabel = quizIdx+1 < quizCards.length ? 'Next →' : 'Finish';
  document.getElementById('quizFeedback').innerHTML = fbHtml +
    `<button class="next-btn next-${c}" onclick="nextQuiz()">${nextLabel}</button>`;
}

function nextQuiz() {
  quizIdx++; quizAnswered = false;
  if (quizIdx >= quizCards.length) { finishQuiz(); } else { renderQuiz(); }
}

function finishQuiz() {
  const P = PRODUCTS[product];
  const c = P.color;
  const pct = Math.round(quizScore/quizCards.length*100);
  const passed = pct >= 50;
  if (passed) { completed[product][activeModule] = true; renderSidebar(); }
  let suggestion = '';
  if (pct < 50) suggestion = `<p style="margin-top:10px;color:var(--muted);font-size:13px">📖 Review the <strong>Basics</strong> tier and try again.</p>`;
  else if (pct < 80) suggestion = `<p style="margin-top:10px;color:var(--muted);font-size:13px">💡 Good progress — try the <strong>Intermediate</strong> tier to go deeper.</p>`;
  else suggestion = `<p style="margin-top:10px;color:var(--muted);font-size:13px">🚀 Excellent! Explore the <strong>Advanced</strong> tier for expert content.</p>`;
  document.getElementById('contentArea').innerHTML = `
    <div class="quiz-wrap">
      <div class="lesson-card">
        <h3 class="${c}">Quiz Complete</h3>
        <p style="font-size:24px;font-weight:700;margin:10px 0">${pct}% <span style="font-size:13px;font-weight:400;color:var(--muted)">(${quizScore} / ${quizCards.length} correct)</span></p>
        <p>${passed ? '✅ Module marked complete!' : '📚 Keep practising — aim for 50% to complete the module.'}</p>
        ${suggestion}
        <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap">
          <button class="next-btn next-${c}" onclick="startQuiz()">Retry Quiz</button>
          <button class="next-btn next-neutral" onclick="setMode('learn')">Back to Learn</button>
        </div>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════
// CHAT
// ══════════════════════════════════════════════════════════
function addChatMsg(role, html) {
  const P = PRODUCTS[product];
  const c = P.color;
  const area = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatarClass = role==='coach' ? `avatar-coach-${c}` : 'avatar-user';
  const avatarLabel = role==='coach' ? '◈' : 'U';
  div.innerHTML = `<div class="msg-avatar ${avatarClass}">${avatarLabel}</div><div class="msg-body">${html}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  addChatMsg('user', q);
  const P = PRODUCTS[product];
  const m = P.modules.find(x=>x.id===activeModule);
  const cont = P.content[activeModule];
  const area = document.getElementById('chatMessages');
  const typing = document.createElement('div');
  typing.className = 'msg coach';
  const c = P.color;
  typing.innerHTML = `<div class="msg-avatar avatar-coach-${c}">◈</div><div class="msg-body typing">Thinking…</div>`;
  area.appendChild(typing);
  area.scrollTop = area.scrollHeight;
  try {
    const systemPrompt = `You are a product coach for SmartBear's ${P.label} product.
Current module: "${m.name}".
Module basics: ${cont.basics.replace(/<[^>]+>/g,'')}
Module intermediate: ${cont.intermediate.replace(/<[^>]+>/g,'')}
Module advanced: ${cont.advanced.replace(/<[^>]+>/g,'')}
Answer clearly and concisely in under 150 words. Use plain text. Reference how ${P.label} connects to ${product==='qmetry'?'Reflect':'QMetry'} when relevant.`;
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: q }]
      })
    });
    const data = await resp.json();
    const answer = data.content?.map(b=>b.text||'').join('') || 'Sorry, I could not get a response.';
    area.removeChild(typing);
    addChatMsg('coach', answer.replace(/\n/g,'<br>'));
  } catch(e) {
    area.removeChild(typing);
    addChatMsg('coach', 'Sorry, there was an error reaching the AI. Please try again.');
  }
}
</script>
